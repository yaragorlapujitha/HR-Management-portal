{% extends 'base.html' %}
{% load static %}

{% block content %}

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow-lg p-4 bg-white rounded">
                <h3 class="text-center text-primary mb-4">{{ action }} Company</h3>

                <form method="POST">
                    {% csrf_token %}

                    <div class="form-group mb-3">
                        <label class="fw-bold">Company Name</label>
                        <input type="text" name="company_name" class="form-control" value="{{ company.company_name }}" required>
                    </div>

                    <div class="form-group mb-3">
                        <label class="fw-bold">Role</label>
                        <input type="text" name="role" class="form-control"value="{{ company.role }}" required>
                    </div>

                    <div class="form-group mb-3">
                        <label class="fw-bold">Salary (₹)</label>
                        <input type="number" name="salary" class="form-control" step="0.01" value="{{ company.salary }}" required>
                    </div>

                    <div class="form-group mb-3">
                        <label class="fw-bold">Tech Stack</label>
                        <input type="text" name="tech_stack" class="form-control" placeholder="Example: Python, Django" value="{{ company.tech_stack }}" required>
                    </div>

                    <!-- 🆕 Address Field Added -->
                    <div class="form-group mb-3">
                        <label class="fw-bold">Address</label>
                        <textarea name="address" class="form-control" rows="3" placeholder="Enter company address"  required> {{ company.address }}</textarea>
                    </div>

 <div class="form-group mb-4">
                        <label class="fw-bold">Year of Passing</label>
                        <input type="number" name="year_of_passing" class="form-control" min="2000" max="2035" value="{{ company.year_of_passing }}" required>
                    </div>

                    <button type="submit" class="btn btn-success w-100">Submit</button>
                </form>

                {% if messages %}
                    <div class="mt-3">
                        {% for message in messages %}
                            <p class="text-success">{{ message }}</p>
                        {% endfor %}
                    </div>
                {% endif %}

            </div>

        </div>
    </div>
</div>

{% endblock %}
